name: check_in_mate
description: A Flutter app that helps track work commute with GPS

publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  get: ^4.6.6              # State management
  go_router: ^14.0.0       # Routing
  get_it: ^7.7.0           # Dependency injection
  hive: ^2.2.3             # Local storage
  hive_flutter: ^1.1.0
  geolocator: ^13.0.0      # GPS / Geofencing
  flutter_local_notifications: ^17.2.0  # Push notifications
  url_launcher: ^6.3.0     # External app jump
  uuid: ^4.4.0             # Unique ID generation
  intl: ^0.19.0            # Date formatting
  logger: ^2.4.0           # Logging

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
